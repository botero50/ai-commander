<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commander - Match History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            padding: 12px;
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .section {
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: glow 2s ease-in-out infinite;
            min-height: 0;
            height: 100%;
            border: 2px solid #4ecdc4;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 30, 30, 0.85) 100%);
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.3), inset 0 0 10px rgba(78, 205, 196, 0.1);
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 15px rgba(78, 205, 196, 0.3), inset 0 0 10px rgba(78, 205, 196, 0.1); }
            50% { box-shadow: 0 0 25px rgba(78, 205, 196, 0.5), inset 0 0 15px rgba(78, 205, 196, 0.2); }
        }

        .title {
            font-size: clamp(14px, 2.5vw, 16px);
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
            color: #4ecdc4;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.8);
        }

        .matches-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .matches-list::-webkit-scrollbar {
            width: 4px;
        }

        .matches-list::-webkit-scrollbar-track {
            background: rgba(78, 205, 196, 0.1);
        }

        .matches-list::-webkit-scrollbar-thumb {
            background: rgba(78, 205, 196, 0.5);
            border-radius: 2px;
        }

        .match {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(78, 205, 196, 0.2);
            border-left: 3px solid #4ecdc4;
            padding: 8px;
            border-radius: 4px;
            font-size: clamp(11px, 1.8vw, 13px);
        }

        .match-text {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }

        .player-name {
            font-weight: bold;
            color: #ffffff;
            font-size: clamp(10px, 1.5vw, 12px);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vs-text {
            color: #888;
            font-size: clamp(9px, 1.3vw, 11px);
        }

        .rating {
            font-size: clamp(10px, 1.5vw, 12px);
            padding: 3px 6px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        .rating.positive {
            color: #00ff00;
        }

        .rating.negative {
            color: #ff6b6b;
        }

        .result {
            font-weight: bold;
            font-size: clamp(10px, 1.5vw, 12px);
        }

        .winner {
            color: #00ff00;
        }

        .loser {
            color: #ff6b6b;
        }

        .empty, .loading {
            text-align: center;
            color: #888888;
            padding: 15px;
            font-size: clamp(11px, 1.6vw, 13px);
            flex-shrink: 0;
        }

        .loading {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="title">🏆 LAST 5 MATCHES</div>
        <div class="matches-list" id="matches">
            <div class="match">
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
            </div>
            <div class="match">
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
            </div>
            <div class="match">
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
            </div>
            <div class="match">
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
            </div>
            <div class="match">
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
                <div class="match-text">
                    <div class="player-name">Waiting...</div>
                    <div class="rating">--</div>
                    <div class="result loser">--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MATCH_API = 'http://localhost:8080/api/match-history';

        function updateMatches() {
            fetch(MATCH_API)
                .then(r => r.json())
                .then(data => {
                    // Only update if there are actual matches, otherwise keep dummy data
                    if (!data.recentMatches || data.recentMatches.length === 0) {
                        return; // Keep the dummy data showing
                    }

                    const matches = data.recentMatches.slice(-5).reverse();
                    let html = matches.map((match, idx) => {
                        const p1 = match.player1;
                        const p2 = match.player2;
                        const p1Won = match.winner === 'player1';
                        const p1Name = p1.brainId.split(':')[1] || p1.brainId;
                        const p2Name = p2.brainId.split(':')[1] || p2.brainId;

                        return `
                            <div class="match">
                                <div class="match-text">
                                    <div class="player-name">${p1Name}</div>
                                    <div class="rating ${p1.ratingChange >= 0 ? 'positive' : 'negative'}">
                                        ${p1.ratingChange >= 0 ? '+' : ''}${p1.ratingChange}
                                    </div>
                                    <div class="result ${p1Won ? 'winner' : 'loser'}">
                                        ${p1Won ? '✓' : '✗'}
                                    </div>
                                </div>
                                <div class="match-text">
                                    <div class="player-name">${p2Name}</div>
                                    <div class="rating ${p2.ratingChange >= 0 ? 'positive' : 'negative'}">
                                        ${p2.ratingChange >= 0 ? '+' : ''}${p2.ratingChange}
                                    </div>
                                    <div class="result ${!p1Won ? 'winner' : 'loser'}">
                                        ${!p1Won ? '✓' : '✗'}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Pad with dummy matches to always show 5 slots
                    while (matches.length < 5) {
                        html += `
                            <div class="match">
                                <div class="match-text">
                                    <div class="player-name">Waiting...</div>
                                    <div class="rating">--</div>
                                    <div class="result loser">--</div>
                                </div>
                                <div class="match-text">
                                    <div class="player-name">Waiting...</div>
                                    <div class="rating">--</div>
                                    <div class="result loser">--</div>
                                </div>
                            </div>
                        `;
                        matches.push({});
                    }

                    document.getElementById('matches').innerHTML = html;
                })
                .catch(() => {
                    // Keep dummy data on connection error
                });
        }

        setInterval(updateMatches, 2000);
        updateMatches();
    </script>
</body>
</html>
