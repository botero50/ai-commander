<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commander - AI Talk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(30, 0, 0, 0.85) 100%);
            border: 3px solid #ff6b6b;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3), inset 0 0 10px rgba(255, 107, 107, 0.1);
            max-width: 700px;
            max-height: 500px;
            display: flex;
            flex-direction: column;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 107, 0.3), inset 0 0 10px rgba(255, 107, 107, 0.1); }
            50% { box-shadow: 0 0 30px rgba(255, 107, 107, 0.5), inset 0 0 15px rgba(255, 107, 107, 0.2); }
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
            letter-spacing: 2px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            min-height: 200px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(255, 107, 107, 0.1);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 107, 107, 0.5);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 107, 107, 0.8);
        }

        .message {
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid;
            padding: 12px;
            border-radius: 6px;
            animation: slideIn 0.5s ease-out;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.ollama {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .message.petra {
            border-left-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }

        .speaker {
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .message.ollama .speaker {
            color: #ff6b6b;
            text-shadow: 0 0 8px rgba(255, 107, 107, 0.6);
        }

        .message.petra .speaker {
            color: #4ecdc4;
            text-shadow: 0 0 8px rgba(78, 205, 196, 0.6);
        }

        .text {
            font-size: 14px;
            color: #ffffff;
            line-height: 1.4;
            font-style: italic;
        }

        .text::before {
            content: '"';
            margin-right: 4px;
        }

        .text::after {
            content: '"';
            margin-left: 4px;
        }

        .empty {
            text-align: center;
            color: #888888;
            padding: 40px 20px;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            color: #ff6b6b;
            padding: 40px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">💬 AI TALK</div>
        <div class="messages" id="messages">
            <div class="loading">Loading AI talk...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/broadcast/chat';
        const MAX_MESSAGES = 8;

        function updateChat() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    if (!data.recentMessages || data.recentMessages.length === 0) {
                        document.getElementById('messages').innerHTML =
                            '<div class="empty">Waiting for trash talk...</div>';
                        return;
                    }

                    // Show last MAX_MESSAGES messages
                    const messages = data.recentMessages.slice(-MAX_MESSAGES);

                    const html = messages.map(msg => {
                        const speaker = msg.speaker.toLowerCase().replace(/[^a-z]/g, '');
                        const displaySpeaker = msg.speaker === 'Ollama' ? 'Ollama' : 'Petra';
                        const className = displaySpeaker.toLowerCase();

                        return `
                            <div class="message ${className}">
                                <div class="speaker">🎤 ${displaySpeaker}</div>
                                <div class="text">${msg.message}</div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('messages').innerHTML = html;
                })
                .catch(error => {
                    console.error('Error fetching chat:', error);
                    document.getElementById('messages').innerHTML =
                        '<div class="loading">Connecting to arena...</div>';
                });
        }

        // Update every 10 seconds
        setInterval(updateChat, 10000);
        updateChat();
    </script>
</body>
</html>
