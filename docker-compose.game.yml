version: '3.8'

services:
  openra-rl:
    build:
      context: ./docker-images
      dockerfile: Dockerfile.optimized
    image: openra-rl:optimized
    container_name: openra-rl-game

    # Critical environment variables for graphics and gRPC
    environment:
      # Virtual display for headless rendering
      DISPLAY: ':99'
      LIBGL_ALWAYS_SOFTWARE: '1'
      MESA_GL_VERSION_OVERRIDE: '3.3'
      LIBGL_DRI3_DISABLE: '0'
      MESA_DEBUG: 'silent'

      # gRPC configuration
      RL_GRPC_PORT: '9999'
      GRPC_VERBOSITY: 'ERROR'

      # OpenRA configuration
      OPENRA_PATH: '/opt/openra'

      # Optional: LLM provider settings
      # OPENROUTER_API_KEY: '${OPENROUTER_API_KEY}'
      # OPENROUTER_MODEL: 'anthropic/claude-sonnet-4-20250514'

    # Increase resource allocation to prevent daemon spawn failures
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
        reservations:
          cpus: '4'
          memory: 4G

    # Port exposure
    ports:
      - "8000:8000"  # FastAPI server
      - "9999:9999"  # gRPC bridge
      - "5900:5900"  # VNC (optional)

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

    # Game content volume
    volumes:
      - openra-content:/root/.config/openra/Content
      - ./openra-logs:/var/log/openra

volumes:
  openra-content:
    driver: local
