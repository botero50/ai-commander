version: '3.8'
services:
  ai-commander-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./tournaments:/app/tournaments
      - ./results:/app/results
    command: npx @ai-commander/server

  ai-commander-cli:
    build: .
    volumes:
      - ./tournaments:/app/tournaments
      - ./results:/app/results
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    # Override with: docker-compose run ai-commander-cli tournament --config=...
