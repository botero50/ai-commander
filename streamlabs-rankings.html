<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commander - Rankings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            padding: 12px;
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .section {
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: glow 2s ease-in-out infinite;
            min-height: 0;
            height: 100%;
            border: 2px solid #00ff00;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 20, 0, 0.85) 100%);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1);
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 0, 0.5), inset 0 0 15px rgba(0, 255, 0, 0.2); }
        }

        .title {
            font-size: clamp(14px, 2.5vw, 16px);
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .rankings-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .rankings-list::-webkit-scrollbar {
            width: 4px;
        }

        .rankings-list::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.1);
        }

        .rankings-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 0, 0.5);
            border-radius: 2px;
        }

        .ranking-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            padding: 8px;
            border-left: 3px solid #00ff00;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .rank-number {
            font-weight: bold;
            font-size: clamp(18px, 2.5vw, 20px);
            color: #00ff00;
            min-width: 35px;
            text-align: center;
        }

        .rank-info {
            flex: 1;
            min-width: 0;
        }

        .brain-name {
            font-weight: bold;
            font-size: clamp(13px, 1.9vw, 15px);
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-stats {
            display: flex;
            gap: 12px;
            font-size: clamp(11px, 1.6vw, 13px);
            color: #aaaaaa;
            margin-top: 4px;
        }

        .rank-stat {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .rank-stat-label {
            font-size: clamp(9px, 1.2vw, 11px);
            color: #888888;
            text-transform: uppercase;
        }

        .rank-stat-value {
            color: #00ff00;
            font-weight: bold;
            font-size: clamp(13px, 1.8vw, 15px);
        }

        .trend-up {
            color: #00ff00;
        }

        .trend-down {
            color: #ff6b6b;
        }

        .empty, .loading {
            text-align: center;
            color: #888888;
            padding: 15px;
            font-size: clamp(11px, 1.6vw, 13px);
            flex-shrink: 0;
        }

        .loading {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="title">🏅 RANKINGS</div>
        <div class="rankings-list" id="rankings">
            <div class="loading">Loading rankings...</div>
        </div>
    </div>

    <script>
        const RANKINGS_API = 'http://localhost:8080/api/rankings';

        function updateRankings() {
            fetch(RANKINGS_API)
                .then(r => r.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        document.getElementById('rankings').innerHTML =
                            '<div class="loading">No rankings yet...</div>';
                        return;
                    }

                    const html = data.slice(0, 10).map(brain => {
                        const trendEmoji = brain.trend === 'up' ? '📈' : '📉';
                        const trendClass = brain.trend === 'up' ? 'trend-up' : 'trend-down';
                        const brainLabel = brain.brainId.split(':')[1] || brain.brainId;

                        return `
                            <div class="ranking-item">
                                <div class="rank-number">#${brain.rank}</div>
                                <div class="rank-info">
                                    <div class="brain-name">${brainLabel}</div>
                                    <div class="rank-stats">
                                        <div class="rank-stat">
                                            <span class="rank-stat-label">Rating</span>
                                            <span class="rank-stat-value">${brain.rating}</span>
                                        </div>
                                        <div class="rank-stat">
                                            <span class="rank-stat-label">Matches</span>
                                            <span class="rank-stat-value">${brain.matches}</span>
                                        </div>
                                        <div class="rank-stat">
                                            <span class="rank-stat-label">Best</span>
                                            <span class="rank-stat-value">${brain.highestRating}</span>
                                        </div>
                                        <div class="rank-stat">
                                            <span class="rank-stat-label" style="margin-bottom: 5px;">Trend</span>
                                            <span class="rank-stat-value ${trendClass}">${trendEmoji}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('rankings').innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('rankings').innerHTML =
                        '<div class="loading">Connecting...</div>';
                });
        }

        setInterval(updateRankings, 2000);
        updateRankings();
    </script>
</body>
</html>
