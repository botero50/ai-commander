name: CI
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Type Check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format Check
        run: npm run format:check
      - name: Test
        run: npm run test
