<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commander - Resources</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(20, 20, 30, 0.8) 100%);
            border: 3px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1);
            max-width: 500px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 0, 0.5), inset 0 0 15px rgba(0, 255, 0, 0.2); }
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            letter-spacing: 2px;
        }

        .tick-info {
            text-align: center;
            font-size: 12px;
            color: #00ff00;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .players-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player {
            border: 2px solid;
            border-radius: 8px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
        }

        .player.p1 {
            border-color: #ff6b6b;
            box-shadow: inset 0 0 10px rgba(255, 107, 107, 0.2);
        }

        .player.p2 {
            border-color: #4ecdc4;
            box-shadow: inset 0 0 10px rgba(78, 205, 196, 0.2);
        }

        .player-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player.p1 .player-name {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
        }

        .player.p2 .player-name {
            color: #4ecdc4;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid;
        }

        .player.p1 .stat {
            border-left-color: #ff6b6b;
        }

        .player.p2 .stat {
            border-left-color: #4ecdc4;
        }

        .stat-label {
            font-size: 11px;
            color: #aaaaaa;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }

        .player.p1 .stat-value {
            color: #ff6b6b;
        }

        .player.p2 .stat-value {
            color: #4ecdc4;
        }

        .phase {
            grid-column: 1 / -1;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 5px;
        }

        .phase-label {
            font-size: 10px;
            color: #aaaaaa;
            text-transform: uppercase;
        }

        .phase-value {
            font-size: 18px;
            font-weight: bold;
            margin-top: 4px;
        }

        .player.p1 .phase-value {
            color: #ff6b6b;
        }

        .player.p2 .phase-value {
            color: #4ecdc4;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #00ff00;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">⚔️ RESOURCES</div>
        <div class="tick-info">
            Tick: <span id="tick">0</span>
        </div>
        <div class="players-wrapper" id="content">
            <div class="loading">Loading match data...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/broadcast/current';

        function updateResources() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    if (!data || !data.player1 || !data.player2) {
                        document.getElementById('content').innerHTML =
                            '<div class="loading">Waiting for match to start...</div>';
                        return;
                    }

                    document.getElementById('tick').textContent = data.tick || 0;

                    const html = `
                        <div class="player p1">
                            <div class="player-name">${data.player1.name || 'Player 1'}</div>
                            <div class="stats-grid">
                                <div class="stat">
                                    <div class="stat-label">Units</div>
                                    <div class="stat-value">${data.player1.units || 0}</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Buildings</div>
                                    <div class="stat-value">${data.player1.buildings || 0}</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Population</div>
                                    <div class="stat-value">${data.player1.population || 0}</div>
                                </div>
                                <div class="phase">
                                    <div class="phase-label">Current Phase</div>
                                    <div class="phase-value">${data.player1.phase || 'Village'}</div>
                                </div>
                            </div>
                        </div>

                        <div class="player p2">
                            <div class="player-name">${data.player2.name || 'Player 2'}</div>
                            <div class="stats-grid">
                                <div class="stat">
                                    <div class="stat-label">Units</div>
                                    <div class="stat-value">${data.player2.units || 0}</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Buildings</div>
                                    <div class="stat-value">${data.player2.buildings || 0}</div>
                                </div>
                                <div class="stat">
                                    <div class="stat-label">Population</div>
                                    <div class="stat-value">${data.player2.population || 0}</div>
                                </div>
                                <div class="phase">
                                    <div class="phase-label">Current Phase</div>
                                    <div class="phase-value">${data.player2.phase || 'Village'}</div>
                                </div>
                            </div>
                        </div>
                    `;

                    document.getElementById('content').innerHTML = html;
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('content').innerHTML =
                        '<div class="loading">Connecting to arena...</div>';
                });
        }

        // Update every 500ms
        setInterval(updateResources, 500);
        updateResources();
    </script>
</body>
</html>
