version: '3.9'

services:
  # AI Commander Stream System
  stream:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-commander-stream
    restart: unless-stopped
    ports:
      - "${STREAM_PORT:-8080}:8080"
      - "6379:6379"
      - "8765:8765"
    environment:
      NODE_ENV: production
      STREAM_PORT: ${STREAM_PORT:-8080}
      STREAM_MATCHES: ${STREAM_MATCHES:-0}
      STREAM_LOG_INTERVAL: ${STREAM_LOG_INTERVAL:-30}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - redis
      - ollama
    networks:
      - ai-commander
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - stream-logs:/app/logs
      - stream-data:/app/data
    labels:
      com.example.description: "AI Commander Stream System"

  # Redis for IPC communication
  redis:
    image: redis:7-alpine
    container_name: ai-commander-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ai-commander
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: ai-commander-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - ai-commander
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ollama-data:/root/.ollama
    pull_policy: always

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-commander-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - ai-commander
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: ai-commander-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - ai-commander
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  ai-commander:
    driver: bridge

volumes:
  stream-logs:
  stream-data:
  redis-data:
  ollama-data:
  prometheus-data:
  grafana-data:
