groups:
  - name: ai-commander
    interval: 30s
    rules:
      # Stream health alerts
      - alert: StreamDown
        expr: up{job="ai-commander-stream"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI Commander Stream is down"
          description: "Stream service at {{ $labels.instance }} is not responding"

      - alert: HighErrorRate
        expr: rate(stream_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in stream"
          description: "Error rate is {{ $value | humanize }} errors/sec"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="ai-commander-stream"} > 500000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Stream using {{ $value | humanize }}B memory"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total{job="ai-commander-stream"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "Stream using {{ $value | humanizePercentage }} CPU"

      # Match execution alerts
      - alert: MatchExecutionFailure
        expr: increase(arena_match_failures_total[5m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Match execution failed"
          description: "{{ $value | humanize }} matches failed in last 5 minutes"

      - alert: SlowMatchExecution
        expr: arena_match_duration_seconds{quantile="0.95"} > 3600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Slow match execution"
          description: "95th percentile match duration is {{ $value | humanizeDuration }}"

      # Redis alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis at {{ $labels.instance }} is not responding"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes > 500000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis memory usage"
          description: "Redis using {{ $value | humanize }}B"

      # API performance alerts
      - alert: HighAPILatency
        expr: api_request_duration_seconds{quantile="0.95"} > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "95th percentile latency is {{ $value | humanizeDuration }}"

      - alert: HighAPIErrorRate
        expr: rate(api_errors_total[5m]) / rate(api_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "Error rate is {{ $value | humanizePercentage }}"
